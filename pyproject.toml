[project]
name = "matcher"
version = "0.1.0"
description = "A simple Python library for entity resolution and deduplication"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "polars>=0.20.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]
